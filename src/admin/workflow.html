<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRV OS — Workflow Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111;
      --border:   #1e1e1e;
      --fg:       #e8e8e8;
      --muted:    #555;
      --accent:   #a0ff6f;
      --warn:     #ffcc44;
      --error:    #ff4d4d;
      --info:     #4db8ff;

      --stage-0: #333;
      --stage-ok: var(--accent);
      --stage-run: var(--info);
      --stage-err: var(--error);
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    header {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 0.85rem; letter-spacing: 0.2em; color: var(--accent); font-weight: bold; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .refresh-label { font-size: 0.7rem; color: var(--muted); }

    main { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 49px); }

    /* ── Sidebar: lista de proyectos ── */
    aside {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .aside-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .aside-title { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
    #proyecto-list { flex: 1; overflow-y: auto; }
    .proyecto-item {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .proyecto-item:hover, .proyecto-item.active { background: var(--surface); }
    .proyecto-item.active { border-left: 2px solid var(--accent); }
    .pi-nombre { font-weight: bold; font-size: 0.85rem; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pi-meta { display: flex; justify-content: space-between; color: var(--muted); font-size: 0.7rem; }
    .pi-badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 2px;
      font-size: 0.65rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    .badge-running  { background: #0d2d4a; color: var(--info); }
    .badge-complete { background: #0d2e0d; color: var(--accent); }
    .badge-error    { background: #2e0d0d; color: var(--error); }
    .badge-pending  { background: #222; color: var(--muted); }

    /* ── Panel de detalle ── */
    #detalle {
      padding: 1.5rem 2rem;
      overflow-y: auto;
    }
    .detalle-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* ── Secciones del detalle ── */
    .section { margin-bottom: 2rem; }
    .section-title {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }
    .kv-grid { display: grid; grid-template-columns: 140px 1fr; gap: 0.3rem 1rem; }
    .kv-key { color: var(--muted); }
    .kv-val { color: var(--fg); }
    .kv-val.accent { color: var(--accent); }
    .kv-val.error  { color: var(--error); }
    .kv-val.warn   { color: var(--warn); }

    /* ── Pipeline de 7 agentes ── */
    .pipeline {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .agente-step {
      flex: 1;
      min-width: 90px;
      padding: 0.6rem 0.5rem;
      border: 1px solid var(--border);
      text-align: center;
      position: relative;
    }
    .agente-step.done    { border-color: var(--accent); background: #0d2e0d; }
    .agente-step.running { border-color: var(--info);   background: #0d2040; animation: blink 1s infinite; }
    .agente-step.error   { border-color: var(--error);  background: #2e0d0d; }
    .agente-step.pending { border-color: var(--border); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .step-icon   { font-size: 1rem; margin-bottom: 0.2rem; }
    .step-name   { font-size: 0.65rem; letter-spacing: 0.05em; color: var(--muted); }
    .step-dur    { font-size: 0.6rem; color: var(--muted); margin-top: 0.2rem; }

    /* ── Tabla de tokens ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    th { text-align: left; padding: 0.4rem 0.6rem; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: normal; letter-spacing: 0.1em; }
    td { padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .num { text-align: right; }
    .cost { color: var(--accent); }

    /* ── Logs ── */
    .log-list { max-height: 220px; overflow-y: auto; }
    .log-item { display: flex; gap: 0.75rem; padding: 0.3rem 0; border-bottom: 1px solid var(--border); font-size: 0.72rem; }
    .log-ts    { color: var(--muted); white-space: nowrap; }
    .log-agente{ color: var(--info); min-width: 100px; }
    .log-estado.completed { color: var(--accent); }
    .log-estado.error     { color: var(--error); }
    .log-estado.started   { color: var(--warn); }
    .log-estado.retrying  { color: var(--warn); }
    .log-msg   { color: var(--muted); }

    /* ── Botones de acción ── */
    .actions { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
    .btn {
      padding: 0.5rem 1rem;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      transition: all 0.15s;
    }
    .btn:hover { background: var(--surface); }
    .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
    .btn-primary:hover { opacity: 0.85; background: var(--accent); }
    .btn-danger  { border-color: var(--error); color: var(--error); }
    .btn-danger:hover { background: #2e0d0d; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Error box ── */
    .error-box {
      padding: 0.75rem 1rem;
      border: 1px solid var(--error);
      background: #2e0d0d;
      color: var(--error);
      font-size: 0.8rem;
      margin-bottom: 1rem;
    }

    /* ── Nuevo proyecto form ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
      width: 520px;
      max-width: 95vw;
    }
    .modal-title { font-size: 0.85rem; letter-spacing: 0.15em; margin-bottom: 1.5rem; color: var(--accent); }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.7rem; color: var(--muted); margin-bottom: 0.3rem; letter-spacing: 0.1em; }
    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 100px; }
    .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: flex-end; }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; }
      aside { max-height: 280px; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">CRV OS — WORKFLOW</span>
  <div class="header-right">
    <div class="pulse"></div>
    <span class="refresh-label" id="refresh-label">Actualizando cada 5s</span>
    <button class="btn btn-primary" onclick="abrirModal()">+ Nuevo proyecto</button>
  </div>
</header>

<main>
  <aside>
    <div class="aside-header">
      <span class="aside-title">Proyectos</span>
      <span id="total-proyectos" style="color:var(--muted);font-size:0.7rem"></span>
    </div>
    <div id="proyecto-list">
      <div style="padding:1rem;color:var(--muted);font-size:0.75rem">Cargando...</div>
    </div>
  </aside>

  <section id="detalle">
    <div class="detalle-empty">← Seleccioná un proyecto para ver el detalle</div>
  </section>
</main>

<!-- Modal nuevo proyecto -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">NUEVO PROYECTO</div>
    <div class="form-group">
      <label>CLIENTE (slug, sin espacios)</label>
      <input id="f-cliente" type="text" placeholder="ej: og-barber" />
    </div>
    <div class="form-group">
      <label>NOMBRE DEL PROYECTO</label>
      <input id="f-nombre" type="text" placeholder="ej: OG Barber Studio" />
    </div>
    <div class="form-group">
      <label>BRIEF (mínimo 20 caracteres)</label>
      <textarea id="f-brief" placeholder="Describí el proyecto: qué necesita el cliente, objetivos, restricciones..."></textarea>
    </div>
    <div id="modal-error" style="display:none" class="error-box"></div>
    <div class="form-actions">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-iniciar" onclick="iniciarProyecto()">Iniciar pipeline</button>
    </div>
  </div>
</div>

<script>
// =============================================================
// Configuración
// =============================================================
const API_BASE      = 'http://localhost:8787';
const REFRESH_MS    = 5000;
const AGENTES_INFO  = [
  { key: 'discovery',    nombre: 'Discovery',    icon: '🔍', modelo: 'Haiku' },
  { key: 'planning',     nombre: 'Planning',     icon: '📋', modelo: 'Haiku' },
  { key: 'architecture', nombre: 'Architecture', icon: '🏗️', modelo: 'Haiku' },
  { key: 'components',   nombre: 'Components',   icon: '🧩', modelo: 'Haiku' },
  { key: 'code',         nombre: 'Code',         icon: '💻', modelo: 'Sonnet' },
  { key: 'qa',           nombre: 'QA',           icon: '✅', modelo: 'Haiku' },
  { key: 'deploy',       nombre: 'Deploy',       icon: '🚀', modelo: 'Haiku' },
];

// Estado local
let proyectos    = [];
let proyectoActivo = null;
let intervalo    = null;

// =============================================================
// Init
// =============================================================
document.addEventListener('DOMContentLoaded', () => {
  cargarProyectos();
  intervalo = setInterval(tick, REFRESH_MS);
});

async function tick() {
  await cargarProyectos();
  if (proyectoActivo) await cargarDetalle(proyectoActivo);
  document.getElementById('refresh-label').textContent =
    'Actualizado ' + new Date().toLocaleTimeString('es-AR');
}

// =============================================================
// Cargar lista de proyectos
// =============================================================
async function cargarProyectos() {
  try {
    const res = await fetch(`${API_BASE}/api/workflow/list`);
    const data = await res.json();
    proyectos = data.proyectos || [];
    renderLista();
  } catch {
    document.getElementById('proyecto-list').innerHTML =
      '<div style="padding:1rem;color:var(--error);font-size:0.75rem">⚠ No se puede conectar al Orchestrator</div>';
  }
}

function renderLista() {
  const el = document.getElementById('proyecto-list');
  document.getElementById('total-proyectos').textContent = `${proyectos.length} proyectos`;

  if (!proyectos.length) {
    el.innerHTML = '<div style="padding:1rem;color:var(--muted);font-size:0.75rem">Sin proyectos. Creá uno →</div>';
    return;
  }

  el.innerHTML = proyectos.map(p => `
    <div class="proyecto-item ${p.proyecto_id === proyectoActivo ? 'active' : ''}"
         onclick="seleccionar('${p.proyecto_id}')">
      <div class="pi-nombre">${esc(p.nombre_proyecto)}</div>
      <div class="pi-meta">
        <span>${esc(p.cliente)}</span>
        <span class="pi-badge badge-${p.status}">${p.status.toUpperCase()}</span>
      </div>
      <div class="pi-meta" style="margin-top:0.2rem">
        <span style="color:var(--muted)">Etapa ${p.stage}/8</span>
        <span style="color:var(--muted)">${formatFecha(p.created_at)}</span>
      </div>
    </div>
  `).join('');
}

// =============================================================
// Seleccionar proyecto y cargar detalle
// =============================================================
async function seleccionar(projectId) {
  proyectoActivo = projectId;
  renderLista();
  await cargarDetalle(projectId);
}

async function cargarDetalle(projectId) {
  try {
    const res = await fetch(`${API_BASE}/api/workflow/status/${projectId}`);
    const p   = await res.json();
    renderDetalle(p);
  } catch (e) {
    document.getElementById('detalle').innerHTML =
      `<div class="error-box">Error cargando detalle: ${esc(e.message)}</div>`;
  }
}

function renderDetalle(p) {
  const el = document.getElementById('detalle');
  const costoFmt = p.costo_total_usd ? `$${p.costo_total_usd.toFixed(4)}` : '$0.0000';

  el.innerHTML = `
    <!-- Acciones -->
    <div class="actions">
      ${p.status === 'error' ? `<button class="btn btn-primary" onclick="reintentar('${p.projectId}')">↻ Reintentar agente</button>` : ''}
      <button class="btn" onclick="cargarDetalle('${p.projectId}')">⟳ Refrescar</button>
    </div>

    ${p.status === 'error' && p.error_msg ? `<div class="error-box">❌ ${esc(p.error_msg)}</div>` : ''}

    <!-- Info general -->
    <div class="section">
      <div class="section-title">Proyecto</div>
      <div class="kv-grid">
        <span class="kv-key">Nombre</span>
        <span class="kv-val accent">${esc(p.nombre_proyecto)}</span>
        <span class="kv-key">Cliente</span>
        <span class="kv-val">${esc(p.cliente)}</span>
        <span class="kv-key">Project ID</span>
        <span class="kv-val" style="font-size:0.65rem;color:var(--muted)">${esc(p.projectId)}</span>
        <span class="kv-key">Estado</span>
        <span class="kv-val ${p.status === 'error' ? 'error' : p.status === 'complete' ? 'accent' : ''}">${p.status.toUpperCase()}</span>
        <span class="kv-key">Etapa actual</span>
        <span class="kv-val">${p.stage}/8 — ${esc(p.stage_nombre || '-')}</span>
        <span class="kv-key">Costo total</span>
        <span class="kv-val cost">${costoFmt}</span>
        <span class="kv-key">Creado</span>
        <span class="kv-val">${formatFechaLarga(p.created_at)}</span>
        ${p.completed_at ? `<span class="kv-key">Completado</span><span class="kv-val accent">${formatFechaLarga(p.completed_at)}</span>` : ''}
      </div>
    </div>

    <!-- Pipeline visual -->
    <div class="section">
      <div class="section-title">Pipeline de agentes</div>
      <div class="pipeline">
        ${AGENTES_INFO.map((ag, i) => {
          const stageNum = i + 1;
          let cls = 'pending';
          if (p.stage > stageNum) cls = 'done';
          else if (p.stage === stageNum && p.status === 'running') cls = 'running';
          else if (p.stage === stageNum && p.status === 'error') cls = 'error';

          // Buscar duración en logs
          const log = (p.logs || []).find(l => l.agente === ag.key && l.estado === 'completed');
          const dur = log?.duracion_ms ? `${(log.duracion_ms/1000).toFixed(1)}s` : '';

          return `
            <div class="agente-step ${cls}">
              <div class="step-icon">${ag.icon}</div>
              <div class="step-name">${ag.nombre}</div>
              <div class="step-dur">${dur || ag.modelo}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <!-- Token usage -->
    ${p.token_usage?.length ? `
    <div class="section">
      <div class="section-title">Tokens y costo por agente</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Agente</th>
              <th>Modelo</th>
              <th class="num">Entrada</th>
              <th class="num">Salida</th>
              <th class="num">Costo USD</th>
            </tr>
          </thead>
          <tbody>
            ${p.token_usage.map(t => `
              <tr>
                <td>${esc(t.agente)}</td>
                <td style="color:var(--muted)">${esc(t.modelo || '-')}</td>
                <td class="num">${fmt(t.tokens_entrada)}</td>
                <td class="num">${fmt(t.tokens_salida)}</td>
                <td class="num cost">$${(t.costo_usd || 0).toFixed(5)}</td>
              </tr>
            `).join('')}
            <tr style="border-top:1px solid var(--border)">
              <td colspan="4" style="color:var(--muted)">TOTAL</td>
              <td class="num cost">$${costoFmt.replace('$','')}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    ` : ''}

    <!-- Logs recientes -->
    ${p.logs?.length ? `
    <div class="section">
      <div class="section-title">Logs recientes</div>
      <div class="log-list">
        ${p.logs.map(l => `
          <div class="log-item">
            <span class="log-ts">${formatHora(l.created_at)}</span>
            <span class="log-agente">${esc(l.agente)}</span>
            <span class="log-estado ${l.estado}">${l.estado}</span>
            ${l.duracion_ms ? `<span class="log-msg">${(l.duracion_ms/1000).toFixed(1)}s</span>` : ''}
            ${l.error_msg ? `<span class="log-msg" style="color:var(--error)">${esc(l.error_msg.slice(0,80))}</span>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
    ` : ''}
  `;
}

// =============================================================
// Reintentar agente fallido
// =============================================================
async function reintentar(projectId) {
  try {
    const res = await fetch(`${API_BASE}/api/workflow/retry/${projectId}`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    await cargarDetalle(projectId);
  } catch (e) {
    alert('Error al reintentar: ' + e.message);
  }
}

// =============================================================
// Modal nuevo proyecto
// =============================================================
function abrirModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-cliente').focus();
}
function cerrarModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-error').style.display = 'none';
}

async function iniciarProyecto() {
  const cliente = document.getElementById('f-cliente').value.trim();
  const nombre  = document.getElementById('f-nombre').value.trim();
  const brief   = document.getElementById('f-brief').value.trim();
  const errEl   = document.getElementById('modal-error');
  const btn     = document.getElementById('btn-iniciar');

  errEl.style.display = 'none';

  if (!cliente || !nombre || !brief) {
    errEl.textContent = 'Completá todos los campos.';
    errEl.style.display = 'block';
    return;
  }
  if (!/^[a-z0-9-]+$/.test(cliente)) {
    errEl.textContent = 'El cliente debe ser slug: solo minúsculas, números y guiones.';
    errEl.style.display = 'block';
    return;
  }
  if (brief.length < 20) {
    errEl.textContent = 'El brief debe tener al menos 20 caracteres.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Iniciando...';

  try {
    const res = await fetch(`${API_BASE}/api/workflow/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cliente, nombre_proyecto: nombre, brief }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    cerrarModal();
    document.getElementById('f-cliente').value = '';
    document.getElementById('f-nombre').value  = '';
    document.getElementById('f-brief').value   = '';

    await cargarProyectos();
    seleccionar(data.projectId);

  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Iniciar pipeline';
  }
}

// Cerrar modal con Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') cerrarModal();
});

// =============================================================
// Helpers
// =============================================================
function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function fmt(n) { return Number(n || 0).toLocaleString('es-AR'); }
function formatFecha(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit' });
}
function formatFechaLarga(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('es-AR');
}
function formatHora(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('es-AR');
}
</script>

</body>
</html>
